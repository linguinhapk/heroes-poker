<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Heroes Poker — Player</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"Inter",sans-serif;background:#071220;color:#e8f0fe;min-height:100vh;max-width:860px;margin:0 auto}

/* ── AUTH ── */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.auth-logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:36px}
.auth-logo img{width:64px;height:64px;object-fit:contain}
.auth-logo h1{font-family:"Bebas Neue",sans-serif;font-size:28px;letter-spacing:3px;color:#fff}
.auth-logo p{font-size:11px;color:#4a90d9;letter-spacing:3px;text-transform:uppercase}
.auth-card{background:#0d1e38;border:1px solid #1e3a6e;border-radius:16px;padding:24px;width:100%;max-width:360px}
.auth-tabs{display:flex;border-bottom:1px solid #1e3a6e;margin-bottom:20px}
.auth-tab{flex:1;background:none;border:none;color:#3a5a8a;padding:10px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:Inter,sans-serif;transition:all .2s}
.auth-tab.active{color:#60a5fa;border-bottom-color:#3b82f6}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:10px;color:#4a90d9;margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.fg input{width:100%;background:#071220;border:1px solid #1e3a6e;color:#e8f0fe;padding:10px 12px;border-radius:8px;font-size:14px;outline:none;font-family:Inter,sans-serif}
.fg input:focus{border-color:#3b82f6}
.btn-auth{width:100%;background:#1d4ed8;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;transition:all .2s;margin-top:4px}
.btn-auth:hover{background:#2563eb}
.auth-msg{font-size:12px;text-align:center;margin-top:12px;padding:8px 12px;border-radius:8px;display:none}
.auth-msg.err{background:#1c0000;border:1px solid #450a0a;color:#f87171;display:block}
.auth-msg.ok{background:#001c0e;border:1px solid #064e3b;color:#34d399;display:block}
.auth-msg.load{background:#1c1000;border:1px solid #78350f;color:#fbbf24;display:block}

/* ── SETUP ── */
.setup-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.setup-card{background:#0d1e38;border:1px solid #1e3a6e;border-radius:16px;padding:24px;width:100%;max-width:360px}
.setup-card h2{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:1px;color:#60a5fa;margin-bottom:4px}
.setup-card p{font-size:12px;color:#3a5a8a;margin-bottom:16px}

/* ── APP ── */
.app-screen{display:none;flex-direction:column;min-height:100vh}
.app-header{background:#0a1628;border-bottom:1px solid #1e3a6e;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.app-header-left{display:flex;align-items:center;gap:10px}
.header-avatar{width:36px;height:36px;border-radius:50%;background:#1d4ed8;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;font-family:"Bebas Neue",sans-serif;flex-shrink:0;overflow:hidden}
.header-avatar img{width:100%;height:100%;object-fit:cover}
.header-name{font-size:14px;font-weight:600;color:#fff}
.header-grupo{font-size:11px;color:#4a90d9}
.header-logo{font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:2px;color:#3a5a8a}
.app-content{flex:1;overflow-y:auto;padding:28px 28px}

/* ── BOTTOM NAV ── */
.bottom-nav{background:#071220;border-bottom:2px solid #1e3a6e;display:flex;width:100%;z-index:49}
.nav-btn{flex:1;background:none;border:none;color:#3a5a8a;padding:14px 8px;font-size:12px;font-weight:500;cursor:pointer;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:8px;font-family:Inter,sans-serif;transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-2px}
.nav-btn .nav-icon{font-size:16px;line-height:1}
.nav-btn.active{color:#60a5fa;border-bottom-color:#3b82f6}
.nav-btn.active .nav-icon{}

/* ── CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#0d1e38;border:1px solid #1e3a6e;border-radius:14px;padding:22px 18px}
.stat-card.full{grid-column:span 2}
.stat-label{font-size:11px;color:#4a90d9;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.stat-value{font-size:30px;font-family:"Bebas Neue",sans-serif;letter-spacing:1px;color:#fff}
.stat-value.pos{color:#34d399}.stat-value.neg{color:#f87171}

.section-title{font-size:11px;color:#3a5a8a;text-transform:uppercase;letter-spacing:2px;font-weight:600;margin:30px 0 16px;padding-bottom:8px;border-bottom:1px solid #112040}

/* ── SCORE BADGE ── */
.score-card{border-radius:14px;padding:22px 20px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between}
.score-num{font-size:56px;font-family:"Bebas Neue",sans-serif;line-height:1}
.score-label-big{font-size:18px;font-family:"Bebas Neue",sans-serif;letter-spacing:2px;padding:5px 14px;border-radius:6px;color:#fff;margin-bottom:8px;display:inline-block}
.score-desc{font-size:12px;color:#94a3b8;max-width:200px;line-height:1.6}

/* ── STATS TABLE ── */
.kpi-table{background:#0d1e38;border:1px solid #1e3a6e;border-radius:12px;overflow:hidden;margin-bottom:16px}
.kpi-row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid #112040;font-size:13px}
.kpi-row:last-child{border-bottom:none}
.kpi-name{color:#94a3b8;font-size:12px;flex:1}
.kpi-alvo{font-size:10px;color:#4a90d9;margin-right:12px;white-space:nowrap}
.kpi-val{font-weight:600;font-size:13px;white-space:nowrap}

/* ── MENTORIA CARDS ── */
.ment-card{background:#0d1e38;border:1px solid #1e3a6e;border-radius:14px;padding:20px;margin-bottom:14px}
.ment-date{font-family:"Bebas Neue",sans-serif;font-size:20px;color:#a78bfa;letter-spacing:1px}
.ment-mentor{font-size:12px;color:#3a5a8a;margin-top:6px}
.ment-mentor span{color:#60a5fa}
.ment-feedback{font-size:14px;color:#cbd5e1;line-height:1.7;margin-top:14px;padding-top:14px;border-top:1px solid #112040}
.ment-empty{text-align:center;padding:40px 20px;color:#3a5a8a;font-size:13px}

/* ── MISSÕES ── */
.mission-card{background:#0d1e38;border:1px solid #1e3a6e;border-radius:12px;padding:16px;margin-bottom:12px}
.mission-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:4px}
.mission-sub{font-size:11px;color:#3a5a8a;margin-bottom:14px}
.q-item{margin-bottom:14px}
.q-label{font-size:12px;color:#93c5fd;font-weight:500;margin-bottom:8px;display:block}
.q-textarea{width:100%;background:#071220;border:1px solid #1e3a6e;color:#e8f0fe;padding:10px 12px;border-radius:8px;font-size:13px;outline:none;font-family:Inter,sans-serif;resize:vertical;min-height:80px}
.q-textarea:focus{border-color:#3b82f6}
.upload-zone{border:2px dashed #1e3a6e;border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.has{border-color:#3b82f6;background:#071e3a}
.upload-zone p{font-size:12px;color:#4a90d9;margin-top:6px}
.upload-thumb{width:100%;max-height:160px;object-fit:contain;border-radius:8px;margin-top:10px;display:none}
.btn-send{width:100%;background:#1d4ed8;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px}
.btn-send:hover{background:#2563eb}
.btn-send:disabled{opacity:.5;cursor:not-allowed}
.send-msg{font-size:12px;text-align:center;margin-top:10px;padding:8px;border-radius:8px;display:none}
.send-msg.ok{background:#001c0e;border:1px solid #064e3b;color:#34d399;display:block}
.send-msg.err{background:#1c0000;border:1px solid #450a0a;color:#f87171;display:block}
.send-msg.load{background:#1c1000;border:1px solid #78350f;color:#fbbf24;display:block}

/* ── ENVIOS HISTORY ── */
.envio-card{background:#0d1e38;border:1px solid #1e3a6e;border-radius:10px;padding:12px;margin-bottom:8px}
.envio-date{font-size:10px;color:#3a5a8a;margin-bottom:6px}
.envio-type{font-size:11px;color:#fbbf24;background:#451a03;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:8px}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;padding:60px 20px;color:#3a5a8a;font-size:13px;flex-direction:column;gap:12px}
.spinner{width:28px;height:28px;border:3px solid #1e3a6e;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.logout-btn{background:none;border:none;color:#3a5a8a;font-size:12px;cursor:pointer;font-family:Inter,sans-serif;padding:4px}
.logout-btn:hover{color:#f87171}

.empty{text-align:center;padding:40px 20px;color:#3a5a8a;font-size:13px}
</style>
</head>
<body>

<!-- ── SETUP SCREEN (first time) ── -->
<div id="setup-screen" class="setup-screen" style="display:none">
  <div class="setup-card">
    <h2>⚙️ Configurar</h2>
    <p>Cole a URL do Firebase e a Web API Key do projeto para continuar.</p>
    <div class="fg">
      <label>Firebase Database URL</label>
      <input type="text" id="cfg-url" placeholder="https://heroes-poker-default-rtdb.firebaseio.com">
    </div>
    <div class="fg">
      <label>Firebase Web API Key</label>
      <input type="text" id="cfg-apikey" placeholder="AIzaSy...">
    </div>
    <div style="font-size:11px;color:#3a5a8a;margin-bottom:14px;line-height:1.6">
      A API Key está em: Firebase Console → Configurações do projeto → Geral → Apps da Web
    </div>
    <button class="btn-auth" onclick="saveSetup()">Salvar e Continuar</button>
    <div id="setup-msg" class="auth-msg"></div>
  </div>
</div>

<!-- ── AUTH SCREEN ── -->
<div id="auth-screen" class="auth-screen" style="display:none">
  <div class="auth-logo">
    <img id="auth-logo-img" src="" alt="Heroes" onerror="this.style.display='none'">
    <h1>Heroes Poker</h1>
    <p>Player Portal</p>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Criar Conta</button>
    </div>
    <!-- Login -->
    <div id="form-login">
      <div class="fg"><label>Email</label><input type="email" id="l-email" placeholder="seu@email.com"></div>
      <div class="fg"><label>Senha</label><input type="password" id="l-senha" placeholder="••••••••"></div>
      <button class="btn-auth" onclick="doLogin()">Entrar</button>
    </div>
    <!-- Register -->
    <div id="form-register" style="display:none">
      <div class="fg"><label>Nome completo</label><input type="text" id="r-nome" placeholder="Seu nome completo"></div>
      <div class="fg"><label>Email</label><input type="email" id="r-email" placeholder="seu@email.com"></div>
      <div class="fg"><label>Senha</label><input type="password" id="r-senha" placeholder="mínimo 6 caracteres"></div>
      <div class="fg"><label>Confirmar Senha</label><input type="password" id="r-senha2" placeholder="repita a senha"></div>
      <button class="btn-auth" onclick="doRegister()">Criar Conta</button>
    </div>
    <div id="auth-msg" class="auth-msg"></div>
  </div>
</div>

<!-- ── APP SCREEN ── -->
<div id="app-screen" class="app-screen">

  <!-- Header -->
  <div class="app-header">
    <div class="app-header-left">
      <div class="header-avatar" id="hdr-avatar">?</div>
      <div>
        <div class="header-name" id="hdr-name">—</div>
        <div class="header-grupo" id="hdr-grupo">—</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="header-logo">HPT</span>
      <button class="logout-btn" onclick="doLogout()" title="Sair">⏻</button>
    </div>
  </div>

  <!-- Top Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-inicio" onclick="setTab('inicio')">
      <span class="nav-icon">🏠</span>Início
    </button>
    <button class="nav-btn" id="nav-resultados" onclick="setTab('resultados')">
      <span class="nav-icon">🏆</span>Resultados
    </button>
    <button class="nav-btn" id="nav-stats" onclick="setTab('stats')">
      <span class="nav-icon">📊</span>Stats
    </button>
    <button class="nav-btn" id="nav-mentorias" onclick="setTab('mentorias')">
      <span class="nav-icon">💬</span>Mentorias
    </button>
    <button class="nav-btn" id="nav-missoes" onclick="setTab('missoes')">
      <span class="nav-icon">🧠</span>Mindset
    </button>
    <button class="nav-btn" id="nav-tarefas" onclick="setTab('tarefas')">
      <span class="nav-icon">🎯</span>Missões
    </button>
    <button class="nav-btn" id="nav-agenda" onclick="setTab('agenda')">
      <span class="nav-icon">📅</span>Agenda
    </button>
  </nav>

  <!-- Content -->
  <div class="app-content" id="app-content">
    <div class="loading"><div class="spinner"></div>Carregando...</div>
  </div>

</div>

<script>
// ── CONFIG ──
var FB_URL = 'https://heroes-poker-team-default-rtdb.firebaseio.com';
var FB_APIKEY = 'AIzaSyBbbJA5UknYDZZh_sXlehWGF9ok31ASkFg';
var currentUser = null;
var playerData = null;
var activeTab = 'inicio';

var LOGO_B64 = ''; // will be set from index.html if needed

var MINDSET_QUESTIONS = [
  'Como você avalia sua disciplina na semana? Descreva situações onde manteve ou perdeu o foco.',
  'Você respeitou os stop loss e limites de sessão definidos?',
  'Como está seu equilíbrio emocional durante as sessões? Houve tilt?',
  'Qual foi o maior erro de execução da semana e o que aprendeu com ele?',
  'Quais são seus objetivos para a próxima semana?'
];

function $(id){ return document.getElementById(id); }

// ── SETUP ──
function loadConfig(){
  return true;
}
function saveSetup(){
  var url = $('cfg-url').value.trim().replace(/\/+$/,'');
  var key = $('cfg-apikey').value.trim();
  if(!url || !key){ showMsg('setup-msg','Preencha todos os campos.','err'); return; }
  localStorage.setItem('hpt_player_cfg', JSON.stringify({url:url, apikey:key}));
  FB_URL = url; FB_APIKEY = key;
  $('setup-screen').style.display = 'none';
  $('auth-screen').style.display = 'flex';
}

// ── AUTH ──
function switchTab(t){
  $('tab-login').classList.toggle('active', t==='login');
  $('tab-register').classList.toggle('active', t==='register');
  $('form-login').style.display = t==='login' ? '' : 'none';
  $('form-register').style.display = t==='register' ? '' : 'none';
  $('auth-msg').style.display = 'none';
}

function showMsg(id, msg, type){
  var el = $(id); if(!el) return;
  el.textContent = msg;
  el.className = 'auth-msg ' + type;
}

async function doLogin(){
  var email = $('l-email').value.trim();
  var senha = $('l-senha').value;
  if(!email || !senha){ showMsg('auth-msg','Preencha email e senha.','err'); return; }
  showMsg('auth-msg','Entrando...','load');
  try{
    var r = await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key='+FB_APIKEY, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password:senha, returnSecureToken:true})
    });
    var d = await r.json();
    if(d.error) throw new Error(translateAuthError(d.error.message));
    currentUser = {uid: d.localId, email: d.email, token: d.idToken};
    localStorage.setItem('hpt_player_session', JSON.stringify({uid:d.localId, email:d.email, token:d.idToken}));
    await loadPlayerData();
  } catch(e){ showMsg('auth-msg', e.message, 'err'); }
}

async function doRegister(){
  var nome  = $('r-nome').value.trim();
  var email = $('r-email').value.trim();
  var senha = $('r-senha').value;
  var senha2= $('r-senha2').value;
  if(!nome || !email || !senha){ showMsg('auth-msg','Preencha todos os campos.','err'); return; }
  if(senha !== senha2){ showMsg('auth-msg','Senhas não conferem.','err'); return; }
  if(senha.length < 6){ showMsg('auth-msg','Senha mínima: 6 caracteres.','err'); return; }
  showMsg('auth-msg','Criando conta...','load');
  try{
    var r = await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key='+FB_APIKEY, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password:senha, returnSecureToken:true})
    });
    var d = await r.json();
    if(d.error) throw new Error(translateAuthError(d.error.message));
    currentUser = {uid: d.localId, email: d.email, token: d.idToken};
    // Save account link
    await fetch(FB_URL+'/hpt_accounts/'+d.localId+'.json', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, nome, createdAt: new Date().toISOString()})
    });
    localStorage.setItem('hpt_player_session', JSON.stringify({uid:d.localId, email:d.email, token:d.idToken}));
    await loadPlayerData();
  } catch(e){ showMsg('auth-msg', e.message, 'err'); }
}

function doLogout(){
  localStorage.removeItem('hpt_player_session');
  currentUser = null; playerData = null;
  $('app-screen').style.display = 'none';
  $('auth-screen').style.display = 'flex';
}

function translateAuthError(msg){
  if(msg.includes('EMAIL_EXISTS')) return 'Este email já está cadastrado.';
  if(msg.includes('INVALID_LOGIN_CREDENTIALS') || msg.includes('INVALID_PASSWORD')) return 'Email ou senha incorretos.';
  if(msg.includes('EMAIL_NOT_FOUND')) return 'Email não encontrado.';
  if(msg.includes('WEAK_PASSWORD')) return 'Senha fraca. Use pelo menos 6 caracteres.';
  if(msg.includes('TOO_MANY_ATTEMPTS')) return 'Muitas tentativas. Tente mais tarde.';
  return msg;
}

// ── LOAD PLAYER DATA ──
async function loadPlayerData(){
  try{
    $('auth-screen').style.display = 'none';
    $('app-screen').style.display = 'flex';
    $('app-content').innerHTML = '<div class="loading"><div class="spinner"></div>Carregando dados...</div>';

    var r = await fetch(FB_URL+'/hpt_players.json');
    if(!r.ok) throw new Error('Erro ao buscar dados.');
    var raw = await r.json();
    var all = raw ? Object.values(raw) : [];

    // Find player by email or name
    var acctR = await fetch(FB_URL+'/hpt_accounts/'+currentUser.uid+'.json');
    var acct = acctR.ok ? await acctR.json() : null;
    var searchName = (acct && acct.nome) ? acct.nome.toLowerCase() : '';
    var searchEmail = (currentUser.email || '').toLowerCase();

    playerData = all.find(function(p){
      if(p.email && p.email.toLowerCase() === searchEmail) return true;
      if(searchName && p.nome && p.nome.toLowerCase() === searchName) return true;
      return false;
    });

    if(!playerData){
      $('app-content').innerHTML = '<div class="empty">⚠️ Perfil não encontrado.<br><span style="font-size:11px;color:#3a5a8a;margin-top:6px;display:block">Peça ao administrador para vincular seu email <b style="color:#60a5fa">'+currentUser.email+'</b> ao seu cadastro.</span></div>';
      $('hdr-name').textContent = acct ? acct.nome : currentUser.email;
      $('hdr-grupo').textContent = '';
      return;
    }

    // Normalize arrays
    if(playerData.records && !Array.isArray(playerData.records)) playerData.records = Object.values(playerData.records);
    if(playerData.estrategias && !Array.isArray(playerData.estrategias)) playerData.estrategias = Object.values(playerData.estrategias);
    if(playerData.mentorias && !Array.isArray(playerData.mentorias)) playerData.mentorias = Object.values(playerData.mentorias);

    // Update header
    var a = aggPlayer(playerData);
    $('hdr-name').textContent = playerData.nome || '—';
    $('hdr-grupo').textContent = a.grupo || playerData.grupo || '—';
    var av = $('hdr-avatar');
    if(playerData.foto){
      av.innerHTML = '<img src="'+playerData.foto+'" onerror="this.style.display=\'none\'">';
    } else {
      av.textContent = ini(playerData.nome);
    }

    renderTab('inicio');
    fetchAgendaPlayer();
    loadTarefasProgress();
  } catch(e){
    $('app-content').innerHTML = '<div class="empty">❌ '+e.message+'</div>';
  }
}

// ── TABS ──
function setTab(t){
  activeTab = t;
  ['inicio','resultados','stats','mentorias','missoes','tarefas','agenda'].forEach(function(tab){
    var b = $('nav-'+tab); if(b) b.classList.toggle('active', tab===t);
  });
  renderTab(t);
}
function renderTab(t){
  if(t==='inicio') renderInicio();
  else if(t==='resultados') renderResultados();

function ini(n){ if(!n) return '?'; return n.split(' ').filter(Boolean).slice(0,2).map(function(w){return w[0]?w[0].toUpperCase():'';}).join(''); }
function fmtUSD(v){ if(v==null) return '—'; var s=Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); return (v>=0?'+ US$ ':'- US$ ')+s; }
function fmtInt(v){ return (v||0).toLocaleString('pt-BR'); }
function aggPlayer(p){
  var recs = p.records||[];
  if(!recs.length) return {torneios:0,avb:0,profit_usd:0,swing:0,grupo:p.grupo||''};
  var torneios = recs.reduce(function(s,r){return s+(r.torneios||0);},0);
  var profit_usd = recs.reduce(function(s,r){return s+(r.profit_usd||0);},0);
  var sw = recs.reduce(function(s,r){return s+(r.swing||0);},0);
  var tw = recs.reduce(function(s,r){return s+((r.avb||0)*(r.torneios||0));},0);
  var avb = torneios>0?tw/torneios:0;
  var grupo = recs.slice(-1)[0]&&recs.slice(-1)[0].grupo || p.grupo||'';
  return {torneios,avb,profit_usd,swing:sw,grupo};
}

function kpiColor(v, k, alvo){
  var cfg = KPI_CONFIG[k] || KPI_CONFIG[(k||'').toUpperCase()];
  if(cfg){
    var n = parseFloat(v); if(isNaN(n)) return '#e8f0fe';
    if(n>=cfg.min && n<=cfg.max) return '#34d399';
    var dev = n<cfg.min?(cfg.min-n):(n-cfg.max);
    return dev<=cfg.tol ? '#fbbf24' : '#f87171';
  }
  // fallback: use alvo range string e.g. "8 - 12"
  if(alvo){
    var parts = alvo.toString().replace(/\s/g,'').split('-');
    if(parts.length===2){
      var lo=parseFloat(parts[0]),hi=parseFloat(parts[1]),vv=parseFloat(v);
      if(!isNaN(lo)&&!isNaN(hi)&&!isNaN(vv)){
        if(vv>=lo&&vv<=hi) return '#34d399';
        var tol=(hi-lo)*1.5;
        return (vv>=lo-tol&&vv<=hi+tol)?'#fbbf24':'#f87171';
      }
    }
  }
  return '#e8f0fe';
}

function calcScore(estrategias){
  if(!estrategias||!estrategias.length) return null;
  var e = estrategias.slice(-1)[0]; var stats = e.stats||{};
  var tp=0, mp=0;
  for(var k in stats){
    var s=stats[k]; var v=typeof s==='object'?s.valor:s;
    if(v==null||v==='') continue;
    var cfg=KPI_CONFIG[k]||KPI_CONFIG[(k||'').toUpperCase()];
    var peso=cfg?cfg.peso:1;
    var nota; if(cfg){ var vf=parseFloat(v); if(isNaN(vf)){continue;} if(vf>=cfg.min&&vf<=cfg.max){nota=100;} else { var dev=vf<cfg.min?(cfg.min-vf):(vf-cfg.max); var alem=Math.max(0,dev-cfg.tol); nota=alem===0?Math.max(80,Math.round((100-(dev/cfg.tol)*cfg.peso*2)*10)/10):Math.max(0,Math.round((100-alem*10*cfg.peso)*10)/10); } } else { nota=80; }
    tp+=nota*peso; mp+=100*peso;
  }
  return mp>0 ? Math.round((tp/mp)*100) : null;
}
function scoreColor(s){ if(s>=85)return'#16a34a'; if(s>=70)return'#2563eb'; if(s>=55)return'#ea580c'; return'#dc2626'; }
function scoreLabel(s){ if(s>=85)return'Elite'; if(s>=70)return'Competente'; if(s>=55)return'Em Desenvolvimento'; return'Crítico'; }
function scoreDesc(s){ if(s>=85)return'Execução técnica consistente. Elegível para subir de stake.'; if(s>=70)return'Sólido. Leaks pontuais. Manter o nível antes de subir.'; if(s>=55)return'Leaks identificáveis. Plano de estudo necessário.'; return'Problemas estruturais. Revisão de fundamentos obrigatória.'; }
function desanitizeKey(k){ return k.replace(/__S__/g,'/').replace(/__D__/g,'$').replace(/__P__/g,'.').replace(/__H__/g,'#').replace(/__LB__/g,'[').replace(/__RB__/g,']').replace(/__Q__/g,'?'); }
function desanitizeStats(stats){ if(!stats) return {}; var out={}; Object.keys(stats).forEach(function(k){ out[desanitizeKey(k)]=stats[k]; }); return out; }

function buildStatsChartP(p){

      var v=stats[k]!=null?(typeof stats[k]==='object'?stats[k].valor:stats[k]):null;

      +'padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:Inter,sans-serif">'+k+'</button>';

  function makeStatsSVG_P(selStats){
    var d=window['_chartData_'+chartId];var sorted=d.sorted;

    var cW=W-PL-PR,cH=H-PT-PB,n=sorted.length;
    var xStep=n>1?cW/(n-1):cW/2;
    function xp(i){return PL+(n>1?i*xStep:cW/2);}
    var allVals=[];
    selStats.forEach(function(k){
      sorted.forEach(function(e){
        var s=desanitizeStats(e.stats||{})[k];
        var v=s!=null?(typeof s==='object'?s.valor:s):null;
        if(v!=null&&!isNaN(parseFloat(v)))allVals.push(parseFloat(v));
      });

    function yp(v){return PT+cH-(v-yMin)/yRange*cH;}
    var COLORS=['#a78bfa','#34d399','#60a5fa','#fbbf24','#f87171','#fb923c','#e879f9','#38bdf8'];
    var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:'+W+'px;height:auto;display:block">';
    svg+='<rect width="'+W+'" height="'+H+'" fill="#071220" rx="8"/>';
    for(var gi=0;gi<=4;gi++){
      var gy=PT+cH*gi/4,gv=(yMax-yRange*gi/4).toFixed(1);
      svg+='<line x1="'+PL+'" y1="'+gy+'" x2="'+(W-PR)+'" y2="'+gy+'" stroke="#112040" stroke-width="1"/>';
      svg+='<text x="'+(PL-4)+'" y="'+(gy+4)+'" text-anchor="end" fill="#3a5a8a" font-size="9" font-family="Inter,sans-serif">'+gv+'</text>';
    }
    sorted.forEach(function(e,i){
      svg+='<text x="'+xp(i)+'" y="'+(H-6)+'" text-anchor="middle" fill="#3a5a8a" font-size="9" font-family="Inter,sans-serif">'+fmtMesLabelP(e.data||'')+'</text>';
    });
    selStats.forEach(function(k,si){
      var cfg=KPI_CONFIG[k],col=COLORS[si%COLORS.length];
      if(cfg){
        var y1=yp(Math.min(cfg.max,yMax)),y2=yp(Math.max(cfg.min,yMin));
        svg+='<rect x="'+PL+'" y="'+y1+'" width="'+cW+'" height="'+(y2-y1)+'" fill="'+col+'" opacity="0.08"/>';
        svg+='<line x1="'+PL+'" y1="'+yp(cfg.min)+'" x2="'+(W-PR)+'" y2="'+yp(cfg.min)+'" stroke="'+col+'" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>';
        svg+='<line x1="'+PL+'" y1="'+yp(cfg.max)+'" x2="'+(W-PR)+'" y2="'+yp(cfg.max)+'" stroke="'+col+'" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>';
      }
      var pts=[];
      sorted.forEach(function(e,i){
        var s=desanitizeStats(e.stats||{})[k];var v=s!=null?(typeof s==='object'?s.valor:s):null;
        if(v!=null&&!isNaN(parseFloat(v)))pts.push({x:xp(i),y:yp(parseFloat(v)),v:parseFloat(v)});
        else pts.push(null);
      });
      var seg='',inSeg=false;
      pts.forEach(function(pt){if(pt){if(!inSeg){seg+='M '+pt.x+' '+pt.y;inSeg=true;}else seg+=' L '+pt.x+' '+pt.y;}else inSeg=false;});
      if(seg)svg+='<path d="'+seg+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
      pts.forEach(function(pt){
        if(!pt)return;
        var inTarget=cfg&&pt.v>=cfg.min&&pt.v<=cfg.max;
        var dotCol=inTarget?col:(pt.v<(cfg?cfg.min:pt.v)?'#f87171':'#fbbf24');
        svg+='<circle cx="'+pt.x+'" cy="'+pt.y+'" r="3.5" fill="'+dotCol+'" stroke="#071220" stroke-width="1.5"/>';
        svg+='<text x="'+pt.x+'" y="'+(pt.y-7)+'" text-anchor="middle" fill="'+col+'" font-size="9" font-family="Inter,sans-serif" font-weight="600">'+pt.v+'</text>';
      });
    });
    svg+='</svg>';return svg;
  }
  return'<div style="margin:20px 0 0;background:#040d18;border:1px solid #1e3a6e;border-radius:12px;padding:14px">'
    +'<div style="font-size:10px;color:#7c3aed;text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:10px">📈 Evolução das Stats</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">'+btnRow+'</div>'
    +'<div id="'+chartId+'_svg">'+makeStatsSVG_P(defaultSel)+'</div>'
    +'</div>';
}

function renderStats(){
  if(!playerData){ $('app-content').innerHTML='<div class="empty">Sem dados.</div>'; return; }
  var estrategias = playerData.estrategias||[];
  if(!estrategias.length){ $('app-content').innerHTML='<div class="empty">📊<br>Nenhuma stat importada ainda.</div>'; return; }

  var sorted = estrategias.slice().sort(function(a,b){return(a.data||'')>(b.data||'')?1:-1;});
  var score = calcScore(estrategias);

  // Collect all stat keys across all months
  var allKeys = [];
  sorted.forEach(function(e){
    var stats = desanitizeStats(e.stats||{});
    Object.keys(stats).forEach(function(k){ if(!allKeys.includes(k)) allKeys.push(k); });
  });
  allKeys = sortStatKeys(allKeys);

  var html = '';
  if(score !== null){
    var col = scoreColor(score);
    html += '<div class="score-card" style="background:'+col+'11;border:1px solid '+col+'44;margin-bottom:20px">';
    html += '<div><span class="score-label-big" style="background:'+col+'">'+scoreLabel(score).toUpperCase()+'</span><div class="score-desc" style="color:#94a3b8;font-size:11px">Score do mês mais recente</div></div>';
    html += '<div class="score-num" style="color:'+col+'">'+score+'%</div></div>';
  }

  // ── TOP 3 PIORES STATS ──
  var latest = sorted.slice(-1)[0];
  if(latest){
    var latestStats = desanitizeStats(latest.stats||{});
    var ranked = [];
    Object.keys(latestStats).forEach(function(k){
      var s = latestStats[k];
      var v = typeof s==='object'?s.valor:s;
      var alvo = typeof s==='object'?s.alvo:null;
      if(v==null) return;
      var cfg = KPI_CONFIG[k]||KPI_CONFIG[(k||'').toUpperCase()];
      var desvio = 0;
      if(cfg){
        var vf = parseFloat(v);
        if(!isNaN(vf) && (vf<cfg.min||vf>cfg.max)){
          desvio = vf<cfg.min?(cfg.min-vf):(vf-cfg.max);
        }
      } else if(alvo){
        var parts = alvo.toString().replace(/\s/g,'').split('-');
        if(parts.length===2){
          var lo=parseFloat(parts[0]),hi=parseFloat(parts[1]),vf2=parseFloat(v);
          if(!isNaN(lo)&&!isNaN(hi)&&!isNaN(vf2)&&(vf2<lo||vf2>hi)){
            desvio = vf2<lo?(lo-vf2):(vf2-hi);
          }
        }
      }
      if(desvio>0) ranked.push({k:k, v:v, alvo:alvo, cfg:cfg, desvio:desvio});
    });
    ranked.sort(function(a,b){return b.desvio-a.desvio;});
    var top3 = ranked.slice(0,3);

    if(top3.length){
      html += '<div class="section-title">🚨 Principais Leaks</div>';
      html += '<div style="display:grid;grid-template-columns:repeat('+Math.min(top3.length,3)+',1fr);gap:12px;margin-bottom:24px">';
      top3.forEach(function(item, i){
        var cfg2 = item.cfg;
        var alvoDisp = cfg2 ? cfg2.min+' – '+cfg2.max : (item.alvo||'—');
        var emoji = i===0?'🥇':i===1?'🥈':'🥉';
        html += '<div style="background:#1c0000;border:1px solid #450a0a;border-radius:14px;padding:18px 16px;text-align:center">';
        html += '<div style="font-size:18px;margin-bottom:6px">'+emoji+'</div>';
        html += '<div style="font-size:11px;color:#f87171;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:10px;line-height:1.3">'+item.k+'</div>';
        html += '<div style="font-size:30px;font-family:\'Bebas Neue\',sans-serif;color:#f87171;line-height:1">'+item.v+'</div>';
        html += '<div style="font-size:11px;color:#3a5a8a;margin-top:6px">Alvo: <span style="color:#4a90d9">'+alvoDisp+'</span></div>';
        html += '<div style="font-size:10px;color:#7f1d1d;margin-top:4px">'+item.desvio.toFixed(1)+' pts fora do range</div>';
        html += '</div>';
      });
      html += '</div>';
    }
  }

  html += '<div class="section-title">📈 Estatísticas</div>';

  // Build table with months as columns
  html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;table-layout:auto">';

  // Header
  html += '<thead><tr>';
  html += '<th style="text-align:left;padding:10px 14px;font-size:11px;color:#4a90d9;text-transform:uppercase;letter-spacing:1px;background:#071220;min-width:180px;position:sticky;left:0;z-index:2">Estatística</th>';
  html += '<th style="text-align:center;padding:10px 14px;font-size:11px;color:#4a90d9;background:#071220;min-width:80px">Alvo</th>';
  sorted.forEach(function(e){
    var mesLabel = e.data ? (e.data.slice(5,7)+'/'+e.data.slice(0,4)) : '—';
    html += '<th style="text-align:center;padding:10px 16px;font-size:14px;color:#a78bfa;background:#071220;font-family:\'Bebas Neue\',sans-serif;letter-spacing:1px;min-width:90px">'+mesLabel+'</th>';
  });
  html += '</tr></thead><tbody>';

  // Rows
  allKeys.forEach(function(k){
    var cfg = KPI_CONFIG[k]||KPI_CONFIG[(k||'').toUpperCase()];
    var alvoDisp = cfg ? cfg.min+' – '+cfg.max : '—';
    // Try to get alvo from any month
    sorted.forEach(function(e){
      var s = desanitizeStats(e.stats||{})[k];
      if(s && typeof s==='object' && s.alvo && alvoDisp==='—') alvoDisp = s.alvo;
    });

    html += '<tr>';
    html += '<td style="padding:9px 14px;border-top:1px solid #112040;color:#94a3b8;font-size:12px;background:#0a1628;position:sticky;left:0">'+k+'</td>';
    html += '<td style="text-align:center;padding:9px 14px;border-top:1px solid #112040;color:#4a90d9;font-size:11px">'+alvoDisp+'</td>';
    sorted.forEach(function(e){
      var stats = desanitizeStats(e.stats||{});
      var s = stats[k];
      var v = s!=null?(typeof s==='object'?s.valor:s):null;
      var alvo = s!=null&&typeof s==='object'?s.alvo:null;
      var col = v!=null ? kpiColor(v, k, alvo) : '#3a5a8a';
      html += '<td style="text-align:center;padding:9px 14px;border-top:1px solid #112040;color:'+col+';font-weight:'+(v!=null?'600':'400')+';font-size:13px">'+(v!=null?v:'—')+'</td>';
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  html += buildStatsChartP(playerData);
  $('app-content').innerHTML = html;
}

function getLeakKey(statName){
  // Normaliza para bater com LEAK_BASE (case-insensitive, com fallbacks)
  var keys = Object.keys(LEAK_BASE);
  var upper = (statName||'').toUpperCase();
  var found = keys.find(function(k){ return k.toUpperCase()===upper; });
  if(!found) found = keys.find(function(k){ return upper.includes(k.toUpperCase())||k.toUpperCase().includes(upper); });
  return found||null;
}

function getTop3Leaks(){
  if(!playerData) return [];
  var estrategias = playerData.estrategias||[];
  if(!estrategias.length) return [];
  var latest = estrategias.slice().sort(function(a,b){return(a.data||'')>(b.data||'')?1:-1;}).slice(-1)[0];
  var stats = desanitizeStats(latest.stats||{});
  var ranked = [];
  Object.keys(stats).forEach(function(k){
    var s = stats[k]; var v = typeof s==='object'?s.valor:s; var alvo = typeof s==='object'?s.alvo:null;
    if(v==null) return;
    var cfg = KPI_CONFIG[k]||KPI_CONFIG[(k||'').toUpperCase()];
    var desvio = 0;
    if(cfg){ var vf=parseFloat(v); if(!isNaN(vf)&&(vf<cfg.min||vf>cfg.max)) desvio=vf<cfg.min?(cfg.min-vf):(vf-cfg.max); }
    else if(alvo){ var parts=alvo.toString().replace(/\s/g,'').split('-'); if(parts.length===2){var lo=parseFloat(parts[0]),hi=parseFloat(parts[1]),vf2=parseFloat(v); if(!isNaN(lo)&&!isNaN(hi)&&!isNaN(vf2)&&(vf2<lo||vf2>hi)) desvio=vf2<lo?(lo-vf2):(vf2-hi);} }
    if(desvio>0) ranked.push({k:k,v:v,alvo:alvo,cfg:cfg,desvio:desvio});
  });
  ranked.sort(function(a,b){return b.desvio-a.desvio;});
  return ranked.slice(0,3);
}

function copyDrillJson(nameOrEl){
  var name = typeof nameOrEl==='string' ? nameOrEl : nameOrEl.dataset.name;
  var jsonStr = '';
  Object.values(LEAK_BASE).forEach(function(entry){
    (entry.drills||[]).forEach(function(d){ if(d.name===name) jsonStr=d.json; });
  });
  if(!jsonStr){ toast('Drill não encontrado','err'); return; }
  navigator.clipboard.writeText(jsonStr).then(function(){
    toast('✅ Config copiada! Cole no GTO Wizard.','ok');
  }).catch(function(){
    var el=document.createElement('textarea');el.value=jsonStr;
    document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);
    toast('✅ Config copiada!','ok');
  });
}

var _drillPrints = {};
function handleDrillPrint(safeKey){
  var input = $('pf-'+safeKey); if(!input||!input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var canvas = document.createElement('canvas');
      var MAX=800; var w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      _drillPrints[safeKey]=canvas.toDataURL('image/jpeg',0.75);
      var thumb=$('pt-'+safeKey); if(thumb){thumb.src=_drillPrints[safeKey];thumb.style.display='block';}
      var uz=$('uz-'+safeKey); if(uz)uz.classList.add('has');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

async function sendTarefa(leakName, safeKey){
  if(!playerData) return;
  var resumo = $('aula-resumo-'+safeKey); var dc = $('dc-'+safeKey);
  var drillCount = dc ? parseInt(dc.value)||0 : 0;
  if(!resumo||!resumo.value.trim()){ showSendMsg('msg-'+safeKey,'Escreva o resumo da aula antes de enviar.','err'); return; }
  if(drillCount<=0 && !_drillPrints[safeKey]){ showSendMsg('msg-'+safeKey,'Informe a quantidade de drills realizados.','err'); return; }

  showSendMsg('msg-'+safeKey,'Enviando...','load');
  try{
    // Carrega progresso atual
    var prog = _tarefasProgress[leakName]||{drillsTotal:0};
    var newTotal = (prog.drillsTotal||0) + drillCount;

    var submission = {
      type:'tarefa', playerId:playerData.id, playerNome:playerData.nome,
      leakName:leakName, data:new Date().toISOString().slice(0,10), timestamp:Date.now(),
      aulaResumo:resumo.value.trim(), drillCount:drillCount,
      imagem:_drillPrints[safeKey]||null
    };
    var key='tar_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    await fetch(FB_URL+'/hpt_submissions/'+playerData.id+'/'+key+'.json',{
      method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(submission)
    });

    // Atualiza progresso acumulado
    var novoProg = {drillsTotal:newTotal, aulaResumo:resumo.value.trim(), ultimoEnvio:new Date().toISOString().slice(0,10)};
    _tarefasProgress[leakName] = novoProg;
    await fetch(FB_URL+'/hpt_tarefas/'+playerData.id+'.json',{
      method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({[leakName]:novoProg})
    });

    showSendMsg('msg-'+safeKey,'✅ Enviado! Total de drills: '+newTotal+'/1.000','ok');
    if(dc) dc.value='';
    _drillPrints[safeKey]='';
    var thumb=$('pt-'+safeKey); if(thumb){thumb.src='';thumb.style.display='none';}
    var uz=$('uz-'+safeKey); if(uz)uz.classList.remove('has');
    // Re-renderiza para atualizar barra
    setTimeout(function(){renderTarefas();},1500);
  }catch(e){ showSendMsg('msg-'+safeKey,'Erro: '+e.message,'err'); }
}

    var desc = $('print-desc') ? $('print-desc').value.trim() : '';
    var submission = {
      type: 'print', playerId: playerData.id, playerNome: playerData.nome,
      data: new Date().toISOString().slice(0,10), timestamp: Date.now(),
      descricao: desc, imagem: _printB64
    };
    var key = 'sub_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    await fetch(FB_URL+'/hpt_submissions/'+playerData.id+'/'+key+'.json', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(submission)
    });
    showSendMsg('msg-print','✅ Print enviado com sucesso!','ok');
    _printB64 = '';
    var thumb=$('upload-thumb'); if(thumb){thumb.src='';thumb.style.display='none';}
    var zone=$('upload-zone'); if(zone)zone.classList.remove('has');
    var desc=$('print-desc'); if(desc)desc.value='';
    var fi=$('print-file'); if(fi)fi.value='';
  } catch(e){ showSendMsg('msg-print','Erro ao enviar: '+e.message,'err'); }
}

function showSendMsg(id, msg, type){
  var el=$(id); if(!el) return;
  el.textContent=msg; el.className='send-msg '+type;
}

window.addEventListener('DOMContentLoaded', function(){
  loadConfig();
  // Try restore session
  var sess = JSON.parse(localStorage.getItem('hpt_player_session')||'null');
  if(sess && sess.uid){
    currentUser = sess;
    loadPlayerData();
  } else {

  }

// ── AGENDA PLAYER ──
var playerAgendaItems = [];

async function fetchAgendaPlayer(){
  if(!FB_URL) return;
  try{
    var r = await fetch(FB_URL+'/hpt_agenda.json');
    if(!r.ok) return;
    var d = await r.json();
    if(d && typeof d === 'object') playerAgendaItems = Object.values(d).filter(Boolean);
    else playerAgendaItems = [];
    playerAgendaItems.sort(function(a,b){
      return ((a.data||'')+(a.hora||'')) > ((b.data||'')+(b.hora||'')) ? 1 : -1;
    });
  }catch(e){ playerAgendaItems = []; }
}

function renderAgendaPlayer(){
  if(!playerData){ $('app-content').innerHTML='<div class="empty">Sem dados.</div>'; return; }
  var grupo = (playerData.grupo || '').toLowerCase().trim();
  var today = new Date().toISOString().slice(0,10);

  // Filter: aulas for player's group or "todos"
  var filtered = playerAgendaItems.filter(function(a){
    if(!a.grupos || !a.grupos.length) return true; // no group = all
    return a.grupos.some(function(g){ return g.toLowerCase().trim() === grupo; });
  });

  var TIPO_LABEL = {'aula':'📚 Aula','treino':'🎯 Treino','mentoria':'💬 Mentoria Coletiva','revisao':'🔄 Revisão'};
  var TIPO_COLOR = {'aula':'#3b82f6','treino':'#a78bfa','mentoria':'#34d399','revisao':'#fbbf24'};

  var upcoming = filtered.filter(function(a){ return a.data >= today; });
  var past = filtered.filter(function(a){ return a.data < today; }).reverse().slice(0,5);

  function card(a){
    var isPast = a.data < today, isToday = a.data === today;
    var col = TIPO_COLOR[a.tipo] || '#3b82f6';
    var lbl = TIPO_LABEL[a.tipo] || a.tipo || 'Aula';
    var d = a.data ? a.data.slice(8)+'/'+a.data.slice(5,7)+'/'+a.data.slice(0,4) : '—';
    var diasRestantes = '';
    if(!isPast && !isToday && a.data){
      var diff = Math.round((new Date(a.data) - new Date(today)) / 86400000);
      diasRestantes = diff === 1 ? '<span style="color:#fbbf24;font-size:11px"> · amanhã</span>' 
        : diff <= 7 ? '<span style="color:#fbbf24;font-size:11px"> · em '+diff+' dias</span>' : '';
    }
    return '<div style="background:#071220;border:1px solid '+(isToday?col:'#1e3a6e')+';border-radius:12px;padding:16px;margin-bottom:12px;opacity:'+(isPast?'0.55':'1')+'">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
        +(isToday?'<span style="background:#16a34a;color:#fff;font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700">HOJE</span>':'')
        +'<span style="background:'+col+'22;color:'+col+';font-size:10px;padding:2px 9px;border-radius:10px;border:1px solid '+col+'44">'+lbl+'</span>'
      +'</div>'
      +'<div style="font-size:15px;font-weight:600;color:#e8f0fe;margin-bottom:6px">'+a.titulo+'</div>'
      +'<div style="font-size:12px;color:#60a5fa;margin-bottom:'+(a.descricao?'6':'0')+'px">📅 '+d+(a.hora?' às '+a.hora:'')+diasRestantes+'</div>'
      +(a.descricao?'<div style="font-size:12px;color:#94a3b8;margin-bottom:8px">'+a.descricao+'</div>':'')
      +(a.link?'<a href="'+a.link+'" target="_blank" style="display:inline-block;font-size:12px;color:#60a5fa;text-decoration:none;background:#0d1e38;border:1px solid #1e3a6e;padding:6px 14px;border-radius:8px;margin-top:4px">🔗 Acessar link</a>':'')
      +'</div>';
  }

  var html = '<div class="section-title">📅 Agenda — '+( grupo ? grupo.charAt(0).toUpperCase()+grupo.slice(1) : 'Todas as aulas')+'</div>';

  if(!filtered.length){
    html += '<div class="empty">📅<br>Nenhuma aula agendada para o seu grupo ainda.</div>';
    $('app-content').innerHTML = html; return;
  }

  if(upcoming.length){
    html += '<div style="font-size:10px;color:#34d399;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:10px">Próximas ('+upcoming.length+')</div>';
    html += upcoming.map(card).join('');
  } else {
    html += '<div style="color:#3a5a8a;font-size:13px;padding:16px 0">Nenhuma aula agendada próxima.</div>';
  }

  if(past.length){
    html += '<div style="font-size:10px;color:#3a5a8a;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin:18px 0 10px">Últimas realizadas</div>';
    html += past.map(card).join('');
  }

  $('app-content').innerHTML = html;
}

</script>
